<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <title>비밀번호 변경</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #e8f0fe 0%, #ede7f6 100%);
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 28px 36px;
      width: 100%;
      max-width: 420px;
    }

    .icon { text-align: center; font-size: 48px; margin-bottom: 12px; line-height: 1; }
    h1 { text-align: center; font-size: 21px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .subtitle { text-align: center; font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.6; }

    label {
      display: block; font-size: 13px; font-weight: 600;
      color: #444; margin-bottom: 8px; margin-top: 20px;
    }
    label:first-of-type { margin-top: 0; }

    .input-wrap { position: relative; }

    input[type="text"], input[type="tel"], input[type="password"] {
      width: 100%;
      padding: 15px 48px 15px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px; /* 16px 以上防止 iOS/Android 自动缩放 */
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
      background: #fafafa;
      color: #111;
      letter-spacing: 1px;
    }
    input:focus { border-color: #1a73e8; background: #fff; }
    input.err { border-color: #e53935; background: #fff; }
    input.ok  { border-color: #43a047; background: #fff; }

    /* 주민등록번호 뒷자리 마스킹 표시 */
    .id-row { display: flex; align-items: center; gap: 10px; }
    .id-row input { flex: 1; }
    .id-sep { font-size: 22px; color: #bbb; font-weight: 300; flex-shrink: 0; }

    .eye {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; font-size: 20px; user-select: none;
      opacity: 0.45; padding: 4px;
    }
    .eye:active { opacity: 1; }

    .hint { font-size: 12px; margin-top: 6px; min-height: 16px; line-height: 1.4; }
    .hint.red   { color: #e53935; }
    .hint.green { color: #43a047; }
    .hint.gray  { color: #999; }

    button {
      width: 100%;
      padding: 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 28px;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
      touch-action: manipulation;
    }
    button:active:not(:disabled) { background: #1557b0; transform: scale(0.98); }
    button:disabled { background: #c5d9f5; color: #8ab0e8; cursor: not-allowed; }

    .err-box {
      margin-top: 14px; padding: 13px 15px;
      border-radius: 10px; font-size: 13px; line-height: 1.5;
      display: none;
      background: #fdecea; color: #c62828;
      border-left: 4px solid #e53935;
    }

    /* 성공 */
    .success-wrap { text-align: center; display: none; }
    .success-wrap .big { font-size: 60px; margin-bottom: 16px; }
    .success-wrap h2 { font-size: 20px; font-weight: 700; color: #2e7d32; margin-bottom: 8px; }
    .success-wrap p { font-size: 14px; color: #777; line-height: 1.6; }

    /* 안전 안내 */
    .notice {
      margin-top: 20px; padding: 12px 14px;
      background: #f5f5f5; border-radius: 10px;
      font-size: 12px; color: #999; line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- 1단계: 주민등록번호 확인 -->
  <div id="stepVerify">
    <div class="icon">🪪</div>
    <h1>본인 확인</h1>
    <p class="subtitle">등록된 주민등록번호를 입력해 주세요.</p>

    <label>주민등록번호</label>
    <div class="id-row">
      <!-- 앞 6자리 (생년월일) -->
      <input type="tel" id="idFront" placeholder="앞 6자리"
             maxlength="6" inputmode="numeric" pattern="\d*">
      <span class="id-sep">—</span>
      <!-- 뒤 7자리 (password 타입으로 마스킹) -->
      <input type="password" id="idBack" placeholder="뒤 7자리"
             maxlength="7" inputmode="numeric" pattern="\d*"
             autocomplete="off">
    </div>
    <div class="hint gray" id="idHint">예: 901201 — 1234567</div>

    <div class="err-box" id="verifyErr"></div>
    <button id="verifyBtn" disabled>확인</button>

    <div class="notice">
      🔒 입력하신 정보는 본인 확인 후 즉시 파기되며, 저장되지 않습니다.
    </div>
  </div>

  <!-- 2단계: 비밀번호 변경 -->
  <div id="stepChange" style="display:none;">
    <div class="icon">🔒</div>
    <h1>비밀번호 변경</h1>
    <p class="subtitle">새로운 비밀번호를 입력해 주세요.</p>

    <label for="pw1">새 비밀번호</label>
    <div class="input-wrap">
      <input type="password" id="pw1" placeholder="8자 이상 입력" autocomplete="new-password">
      <span class="eye" data-t="pw1">👁</span>
    </div>

    <label for="pw2">비밀번호 확인</label>
    <div class="input-wrap">
      <input type="password" id="pw2" placeholder="비밀번호를 다시 입력" autocomplete="new-password">
      <span class="eye" data-t="pw2">👁</span>
    </div>
    <div class="hint" id="pwHint"></div>

    <div class="err-box" id="changeErr"></div>
    <button id="confirmBtn" disabled>확인</button>
  </div>

  <!-- 완료 -->
  <div class="success-wrap" id="stepDone">
    <div class="big">✅</div>
    <h2>변경 완료</h2>
    <p>비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 로그인해 주세요.</p>
  </div>

</div>

<script>
  // ── 주민등록번호 검증 ─────────────────────────────────
  // 실제 서비스에서는 이 함수를 서버 API 호출로 교체하세요.
  function verifyId(front, back) {
    // 예시 데이터 (실제 환경에서는 서버에서 검증)
    const MOCK = '9012011234567';
    return (front + back) === MOCK;
  }

  const idFront  = document.getElementById('idFront');
  const idBack   = document.getElementById('idBack');
  const idHint   = document.getElementById('idHint');
  const verifyBtn= document.getElementById('verifyBtn');
  const verifyErr= document.getElementById('verifyErr');

  function checkIdReady() {
    const f = idFront.value.trim();
    const b = idBack.value.trim();
    const ready = /^\d{6}$/.test(f) && /^\d{7}$/.test(b);
    verifyBtn.disabled = !ready;
    verifyErr.style.display = 'none';

    if (f.length === 6 && b.length === 0) {
      idBack.focus(); // 앞자리 완성 시 자동으로 뒤로 이동
    }
  }

  idFront.addEventListener('input', () => {
    idFront.value = idFront.value.replace(/\D/g, '');
    checkIdReady();
  });
  idBack.addEventListener('input', () => {
    idBack.value = idBack.value.replace(/\D/g, '');
    checkIdReady();
  });

  verifyBtn.addEventListener('click', () => {
    const f = idFront.value.trim();
    const b = idBack.value.trim();

    if (verifyId(f, b)) {
      document.getElementById('stepVerify').style.display = 'none';
      document.getElementById('stepChange').style.display = '';
    } else {
      verifyErr.textContent = '주민등록번호가 일치하지 않습니다. 다시 확인해 주세요.';
      verifyErr.style.display = 'block';
      idFront.className = 'err';
      idBack.className = 'err';
    }
  });

  // ── 비밀번호 변경 ─────────────────────────────────────
  const pw1       = document.getElementById('pw1');
  const pw2       = document.getElementById('pw2');
  const pwHint    = document.getElementById('pwHint');
  const confirmBtn= document.getElementById('confirmBtn');
  const changeErr = document.getElementById('changeErr');

  function checkPasswords() {
    const v1 = pw1.value, v2 = pw2.value;

    if (v2.length === 0) {
      pw2.className = ''; pwHint.textContent = ''; pwHint.className = 'hint';
      confirmBtn.disabled = true; return;
    }
    if (v1 === v2 && v1.length >= 8) {
      pw2.className = 'ok';
      pwHint.textContent = '비밀번호가 일치합니다 ✓';
      pwHint.className = 'hint green';
      confirmBtn.disabled = false;
    } else {
      pw2.className = 'err';
      pwHint.textContent = v1.length < 8 ? '비밀번호는 8자 이상이어야 합니다' : '비밀번호가 일치하지 않습니다';
      pwHint.className = 'hint red';
      confirmBtn.disabled = true;
    }
  }

  pw1.addEventListener('input', checkPasswords);
  pw2.addEventListener('input', checkPasswords);

  document.querySelectorAll('.eye').forEach(el => {
    el.addEventListener('click', () => {
      const inp = document.getElementById(el.dataset.t);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    });
  });

  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true;
    confirmBtn.textContent = '처리 중…';
    changeErr.style.display = 'none';

    try {
      // 실제 서비스: fetch('/api/change-password', { method:'POST', ... })
      await new Promise(r => setTimeout(r, 700));
      document.getElementById('stepChange').style.display = 'none';
      document.getElementById('stepDone').style.display = 'block';
    } catch {
      changeErr.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
      changeErr.style.display = 'block';
      confirmBtn.disabled = false;
      confirmBtn.textContent = '확인';
    }
  });
</script>
</body>
</html>
