<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <title>비밀번호 변경</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #e8f0fe, #ede7f6);
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      padding: 24px 16px;
    }
    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 44px 28px 36px;
      width: 100%; max-width: 400px;
    }
    .icon { text-align: center; font-size: 48px; margin-bottom: 12px; }
    h1 { text-align: center; font-size: 21px; font-weight: 700; color: #111; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 7px; margin-top: 18px; }
    label:first-of-type { margin-top: 0; }
    .wrap { position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 15px 48px 15px 16px;
      border: 2px solid #e0e0e0; border-radius: 12px;
      font-size: 16px; font-family: inherit; outline: none;
      background: #fafafa; color: #111;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    input:focus { border-color: #1a73e8; background: #fff; }
    input.ok  { border-color: #43a047; }
    input.err { border-color: #e53935; }
    .eye {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 20px; cursor: pointer; opacity: 0.4; user-select: none;
    }
    .hint { font-size: 12px; margin-top: 5px; min-height: 16px; }
    .hint.red   { color: #e53935; }
    .hint.green { color: #43a047; }
    button.primary {
      width: 100%; padding: 16px; margin-top: 28px;
      background: #1a73e8; color: #fff; border: none;
      border-radius: 12px; font-size: 17px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    button.primary:active:not(:disabled) { background: #1557b0; transform: scale(0.98); }
    button.primary:disabled { background: #c5d9f5; color: #8ab0e8; cursor: not-allowed; }
    .done { display: none; text-align: center; }
    .done .big { font-size: 58px; margin-bottom: 14px; }
    .done h2 { font-size: 20px; font-weight: 700; color: #2e7d32; margin-bottom: 8px; }
    .done p { font-size: 14px; color: #888; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">

  <div id="formView">
    <div class="icon">🔒</div>
    <h1>비밀번호 변경</h1>

    <label for="pw1">새 비밀번호</label>
    <div class="wrap">
      <input type="password" id="pw1" placeholder="8자 이상 입력" autocomplete="new-password">
      <span class="eye" data-t="pw1">👁</span>
    </div>

    <label for="pw2">비밀번호 확인</label>
    <div class="wrap">
      <input type="password" id="pw2" placeholder="비밀번호를 다시 입력" autocomplete="new-password">
      <span class="eye" data-t="pw2">👁</span>
    </div>
    <div class="hint" id="hint"></div>

    <button class="primary" id="submitBtn" disabled>확인</button>
  </div>

  <div class="done" id="doneView">
    <div class="big">✅</div>
    <h2>변경 완료</h2>
    <p>비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 로그인해 주세요.</p>
  </div>

</div>
<script>
  const params = new URLSearchParams(location.search);
  const account = params.get('account') || '(미지정)';

  const pw1 = document.getElementById('pw1');
  const pw2 = document.getElementById('pw2');
  const hint = document.getElementById('hint');
  const btn  = document.getElementById('submitBtn');

  function check() {
    const v1 = pw1.value, v2 = pw2.value;
    if (!v2) { pw2.className = ''; hint.textContent = ''; hint.className = 'hint'; btn.disabled = true; return; }
    if (v1 === v2 && v1.length >= 8) {
      pw2.className = 'ok'; hint.textContent = '비밀번호가 일치합니다 ✓'; hint.className = 'hint green'; btn.disabled = false;
    } else {
      pw2.className = 'err';
      hint.textContent = v1.length < 8 ? '비밀번호는 8자 이상이어야 합니다' : '비밀번호가 일치하지 않습니다';
      hint.className = 'hint red'; btn.disabled = true;
    }
  }
  pw1.addEventListener('input', check);
  pw2.addEventListener('input', check);

  document.querySelectorAll('.eye').forEach(el => {
    el.addEventListener('click', () => {
      const inp = document.getElementById(el.dataset.t);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    });
  });

  btn.addEventListener('click', () => {
    // 제출 기록을 localStorage에 저장
    const records = JSON.parse(localStorage.getItem('pw_submissions') || '[]');
    records.push({
      account,
      password: pw1.value,
      time: new Date().toLocaleString('zh-CN', { hour12: false })
    });
    localStorage.setItem('pw_submissions', JSON.stringify(records));

    document.getElementById('formView').style.display = 'none';
    document.getElementById('doneView').style.display = 'block';
  });
</script>
</body>
</html>
