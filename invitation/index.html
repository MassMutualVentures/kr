<style>

  .panel { max-width:920px; margin:0 auto; padding:24px 20px 8px; }

  button:hover { background:#f3f0e8; }
  button.primary { background:#102746; border-color:#102746; color:#f3eee2; }
  button.primary:hover { background:#173356; }
  .count { font-size:13px; color:#6a6a64; }
  .hint { font-size:12px; color:#8a8a82; margin-top:6px; line-height:1.6; }

  .card-page { margin:0 auto 14px; }
  .card-wrap { background:#fff; box-shadow:0 2px 14px rgba(0,0,0,.12); border-radius:6px; overflow:hidden; }

  .card-tools { display:flex; justify-content:center; gap:8px; margin:8px 0 18px; }
  .card-tools button { padding:5px 12px; font-size:12px; }
  @media print {
    @page { size:A5 portrait; margin:0; }
    body { background:#fff; }
    .no-print { display:none !important; }
    #cards { max-width:none; margin:0; padding:0; }

function val(id){return document.getElementById(id).value.trim();}
function commonCfg(){
  return {
    date:val("f-date")||"2026. 7. 25 (토)",
    time:val("f-time")||"오후 6시 30분",
    floor:val("f-floor"),
    dress:val("f-dress"),
    email:val("f-email")||"events.korea@janushenderson.com",
    rep:val("f-rep")||"○○○"
  };
}

function rasterize(svgEl,scale){
  return new Promise(function(resolve,reject){
    var vb=svgEl.getAttribute("viewBox").split(/\s+/).map(Number);
    var w=vb[2],h=vb[3];
    var clone=svgEl.cloneNode(true);
    clone.setAttribute("width",w); clone.setAttribute("height",h);
    var xml=new XMLSerializer().serializeToString(clone);
    var url="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      canvas.width=Math.round(w*scale); canvas.height=Math.round(h*scale);
      var ctx=canvas.getContext("2d");
      ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas);
    };
    img.onerror=reject;
    img.src=url;
  });
}
function downloadPng(svgEl,filename){
  rasterize(svgEl,3).then(function(canvas){
    canvas.toBlob(function(blob){
      var a=document.createElement("a");
      a.href=URL.createObjectURL(blob); a.download=filename; a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
    },"image/png");
  }).catch(function(){alert("图片导出失败，可改用“打印 / 存为 PDF”。");});
}
function downloadPdf(){
  var svgs=Array.prototype.slice.call(document.querySelectorAll("#cards svg"));
  if(!svgs.length)return;
  if(!(window.jspdf&&window.jspdf.jsPDF)){alert("PDF 组件未加载（可能离线），已改用打印窗口，请在其中选择“另存为 PDF”。");window.print();return;}
  var jsPDF=window.jspdf.jsPDF;
  var pdf=new jsPDF({unit:"pt",format:"a5",orientation:"portrait"});
  var pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  var i=0;
  (function next(){
    if(i>=svgs.length){pdf.save("janus_henderson_invitations.pdf");return;}
    rasterize(svgs[i],3).then(function(canvas){
      var data=canvas.toDataURL("image/png");
      var iw=canvas.width,ih=canvas.height,m=18;
      var r=Math.min((pw-m*2)/iw,(ph-m*2)/ih);
      var w=iw*r,h=ih*r,x=(pw-w)/2,y=(ph-h)/2;
      if(i>0)pdf.addPage();
      pdf.addImage(data,"PNG",x,y,w,h);
      i++; next();
    }).catch(function(){i++;next();});
  })();
}

function addPage(svgString,rawName,kind){
  var page=document.createElement("div"); page.className="card-page";
  var wrap=document.createElement("div"); wrap.className="card-wrap";
  wrap.innerHTML=svgString; page.appendChild(wrap);
  var tools=document.createElement("div"); tools.className="card-tools no-print";
  var btn=document.createElement("button"); btn.textContent="下载 PNG";
  var svgEl=wrap.querySelector("svg");
  var safe=(rawName||"guest").replace(/[\\/:*?"<>|\u3000\s]+/g,"_");
  btn.addEventListener("click",function(){downloadPng(svgEl,safe+"_"+kind+".png");});
  tools.appendChild(btn); page.appendChild(tools);
  document.getElementById("cards").appendChild(page);
}

function build(){
  var c=commonCfg();
  var progOn=document.getElementById("f-prog").checked;
  var names=val("f-names").split("\n").map(function(s){return s.trim();}).filter(Boolean);
  var wrap=document.getElementById("cards"); wrap.innerHTML="";
  names.forEach(function(n){
    addPage(inviteCard(honor(n),c),n,"초청장");
    if(progOn)addPage(progCard(c),n,"순서");
  });
  document.getElementById("count").textContent="共 "+names.length+" 位 · "+wrap.children.length+" 张卡片";
}

document.getElementById("btn-gen").addEventListener("click",build);
document.getElementById("btn-pdf").addEventListener("click",function(){build();setTimeout(downloadPdf,60);});
document.getElementById("btn-print").addEventListener("click",function(){build();window.print();});
["f-date","f-time","f-floor","f-dress","f-rep","f-email","f-prog"].forEach(function(id){
  document.getElementById(id).addEventListener("input",build);
});
build();
</script>
